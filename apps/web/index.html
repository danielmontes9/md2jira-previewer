      content="markdown to jira, jira wiki markup, adf converter, atlassian document format, markdown converter, jira cloud, jira formatting"
    />

    <link rel="canonical" href="https://danielmontes9.github.io/md2jira" />

    />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <script>
      const t = localStorage.getItem('theme')
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      }
    </script>

        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },

  <body class="min-h-screen bg-white text-neutral-900 dark:bg-neutral-950 dark:text-neutral-100">
